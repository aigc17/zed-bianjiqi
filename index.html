<!DOCTYPE html>
<!--
  [INPUT]: ipcRenderer - 渲染进程与主进程通信，调用项目管理与系统对话框 IPC
  [INPUT]: main.js - 提供窗口管理、项目持久化、文件夹选择等主进程能力
  [OUTPUT]: 顶部标签栏 UI、交互逻辑、项目列表渲染拖拽排序与当前项目高亮同步
  [POS]: 渲染进程入口，承载 Zed 项目标签栏的可视化与交互，并把真实当前项目显式呈现给用户
  
  [PROTOCOL]: 变更时更新此头部，然后检查 CLAUDE.md
-->
<html>
<head>
  <meta charset="UTF-8">
  <title>Zed Workspace Manager</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      font-size: 12px;
      background: transparent;
      overflow: visible;
    }
    
    .tab-bar {
      display: flex;
      align-items: center;
      height: 36px;
      padding: 4px 8px;
      background: #1e1e1e;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .tabs {
      display: flex;
      gap: 4px;
      flex: 1;
      overflow-x: auto;
    }
    .tabs::-webkit-scrollbar { display: none; }
    
    .tab {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid transparent;
      border-radius: 6px;
      color: rgba(255, 255, 255, 0.7);
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
      position: relative;
    }
    .tab:hover { background: rgba(255, 255, 255, 0.15); color: #fff; }
    .tab.active {
      background: linear-gradient(135deg, rgba(22, 163, 74, 0.96), rgba(21, 128, 61, 0.9));
      border-color: rgba(187, 247, 208, 0.38);
      box-shadow: 0 10px 22px rgba(22, 163, 74, 0.38), 0 0 0 1px rgba(34, 197, 94, 0.12);
      color: #fff;
    }
    .tab.custom-color {
      background: linear-gradient(135deg, var(--tab-bg-start), var(--tab-bg-end));
      border-color: var(--tab-border);
      box-shadow: 0 8px 18px var(--tab-shadow);
      color: #fff;
    }
    .tab.custom-color:hover {
      background: linear-gradient(135deg, var(--tab-hover-start), var(--tab-hover-end));
      box-shadow: 0 10px 22px var(--tab-shadow-hover);
    }
    .tab.custom-color.active {
      background: linear-gradient(135deg, rgba(22, 163, 74, 0.96), rgba(21, 128, 61, 0.9));
      border-color: rgba(187, 247, 208, 0.38);
      box-shadow: 0 10px 22px rgba(22, 163, 74, 0.38), 0 0 0 1px rgba(34, 197, 94, 0.12);
    }
    .tab .name { font-weight: 500; }
    .tab.active .name { font-weight: 700; }
    .tab.custom-color .shortcut { opacity: 0.72; }
    .tab .shortcut { font-size: 10px; opacity: 0.5; margin-left: 4px; }
    .tab.active .shortcut { opacity: 0.88; }
    .tab .active-badge {
      padding: 1px 6px;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(251, 146, 60, 0.98), rgba(234, 88, 12, 0.94));
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.04em;
      border: 1px solid rgba(255, 255, 255, 0.88);
      box-shadow: 0 6px 14px rgba(234, 88, 12, 0.28), inset 0 0 0 1px rgba(255, 255, 255, 0.12);
    }
    .tab .close {
      opacity: 0; margin-left: 4px; width: 14px; height: 14px;
      border-radius: 3px; display: flex; align-items: center;
      justify-content: center; transition: all 0.15s ease;
    }
    .tab:hover .close { opacity: 0.6; }
    .tab .close:hover { opacity: 1; background: rgba(255, 255, 255, 0.2); }
    
    .add-btn {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 6px; color: rgba(255, 255, 255, 0.5);
      cursor: pointer; transition: all 0.15s ease;
      -webkit-app-region: no-drag; margin-right: 8px;
      position: relative;
    }
    .add-btn:hover { background: rgba(255, 255, 255, 0.15); color: #fff; }
    
    .dropdown {
      position: fixed;
      top: 40px; left: 8px;
      background: #2d2d2d;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      min-width: 240px;
      overflow-y: auto;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      z-index: 1000;
      display: none;
    }
    .dropdown::-webkit-scrollbar { width: 8px; }
    .dropdown::-webkit-scrollbar-track { background: #1e1e1e; border-radius: 4px; }
    .dropdown::-webkit-scrollbar-thumb { background: #4a4a4a; border-radius: 4px; }
    .dropdown::-webkit-scrollbar-thumb:hover { background: #5a5a5a; }
    .dropdown.show { display: block; }
    .dropdown-item {
      padding: 12px 16px;
      color: rgba(255, 255, 255, 0.9);
      cursor: pointer;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 13px;
    }
    .dropdown-item:hover { background: rgba(99, 102, 241, 0.3); }
    .dropdown-item:last-child { border-bottom: none; }
    .dropdown-item.new-folder {
      color: rgba(99, 102, 241, 1);
      font-weight: 500;
    }
    .dropdown-divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.15);
      margin: 4px 0;
    }
    .dropdown-label {
      padding: 8px 16px 4px;
      color: rgba(255, 255, 255, 0.4);
      font-size: 11px;
      text-transform: uppercase;
    }
    .dropdown-empty {
      padding: 16px;
      color: rgba(255, 255, 255, 0.4);
      text-align: center;
      font-size: 13px;
    }
    
    .drag-over { background: rgba(99, 102, 241, 0.3) !important; }
    
    /* 右键菜单 */
    .context-menu {
      position: fixed;
      background: #2d2d2d;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      min-width: 160px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      z-index: 2000;
      display: none;
      padding: 4px 0;
    }
    .context-menu.show { display: block; }
    .context-menu-item {
      padding: 8px 14px;
      color: rgba(255, 255, 255, 0.9);
      cursor: pointer;
      font-size: 13px;
    }
    .context-menu-item:hover { background: rgba(99, 102, 241, 0.3); }
    .context-menu-divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.1);
      margin: 4px 0;
    }
    .color-picker {
      display: flex;
      gap: 6px;
      padding: 8px 14px;
    }
    .color-dot {
      width: 18px; height: 18px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.1s;
    }
    .color-dot:hover { transform: scale(1.2); }
    .color-dot.selected { border-color: #fff; }
    
    /* 重命名输入框 */
    .rename-input {
      background: #3d3d3d;
      border: 1px solid rgba(99, 102, 241, 0.6);
      border-radius: 4px;
      color: #fff;
      padding: 4px 8px;
      font-size: 12px;
      outline: none;
      width: 100%;
    }
    
    /* 标签颜色指示器 */
    .tab .color-indicator {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Loading 状态 */
    .add-btn.loading {
      pointer-events: none;
      opacity: 0.5;
    }
    .add-btn.loading::after {
      content: '';
      position: absolute;
      width: 12px; height: 12px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    .tab.loading {
      pointer-events: none;
      opacity: 0.6;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 轻提示 */
    .toast {
      position: fixed;
      right: 10px;
      top: 6px;
      max-width: 420px;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.2;
      color: #fff;
      background: rgba(190, 52, 52, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.32);
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 0.15s ease, transform 0.15s ease;
      pointer-events: none;
      z-index: 3000;
    }
    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="tab-bar">
    <div class="add-btn" id="addBtn" title="添加项目">+</div>
    <div class="tabs" id="tabs"></div>
  </div>
  <div class="dropdown" id="dropdown"></div>
  <div class="context-menu" id="contextMenu"></div>
  <div class="toast" id="toast"></div>

  <script>
    const { ipcRenderer } = require('electron');

    // ========================================================================
    // IPC 超时保护
    // ========================================================================

    function ipcWithTimeout(channel, args = [], timeoutMs = 5000) {
      return new Promise((resolve, reject) => {
        const timer = setTimeout(() => {
          reject(new Error(`IPC "${channel}" 超时 (${timeoutMs}ms)`));
        }, timeoutMs);
        ipcRenderer.invoke(channel, ...args)
          .then(resolve, reject)
          .finally(() => clearTimeout(timer));
      });
    }

    const COLORS = ['#4b7c72', '#4d6b80', '#4f5982', '#645185', '#815675', '#7e614e', '#6f7750'];

    let projects = [];
    let activeProject = null;
    let confirmedActiveProject = null;
    let draggedIndex = null;
    let dropdownOpen = false;
    let contextMenuIndex = -1;
    let isOperationPending = false;
    let toastTimer = null;

    function hexToRgba(hex, alpha) {
      if (!hex) return '';
      const normalized = hex.replace('#', '').trim();
      const expanded = normalized.length === 3
        ? normalized.split('').map(ch => ch + ch).join('')
        : normalized;

      if (!/^[0-9a-fA-F]{6}$/.test(expanded)) return '';

      const r = parseInt(expanded.slice(0, 2), 16);
      const g = parseInt(expanded.slice(2, 4), 16);
      const b = parseInt(expanded.slice(4, 6), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function mixHexColor(hex, mix = 0) {
      if (!hex) return '';
      const normalized = hex.replace('#', '').trim();
      const expanded = normalized.length === 3
        ? normalized.split('').map(ch => ch + ch).join('')
        : normalized;

      if (!/^[0-9a-fA-F]{6}$/.test(expanded)) return '';

      const mixChannel = (offset, target) => {
        const value = parseInt(expanded.slice(offset, offset + 2), 16);
        return Math.max(0, Math.min(255, Math.round(value + (target - value) * Math.abs(mix))));
      };

      const target = mix >= 0 ? 255 : 0;
      const r = mixChannel(0, target);
      const g = mixChannel(2, target);
      const b = mixChannel(4, target);
      return `rgb(${r}, ${g}, ${b})`;
    }

    function getTabColorStyle(color) {
      if (!color) return '';

      const bgStart = mixHexColor(color, 0.06);
      const bgEnd = mixHexColor(color, -0.12);
      const hoverStart = mixHexColor(color, 0.1);
      const hoverEnd = mixHexColor(color, -0.08);
      const activeStart = mixHexColor(color, 0.13);
      const activeEnd = mixHexColor(color, -0.14);
      const border = hexToRgba(color, 0.16);
      const borderActive = hexToRgba(color, 0.24);
      const shadow = hexToRgba(color, 0.1);
      const shadowHover = hexToRgba(color, 0.14);
      const shadowActive = hexToRgba(color, 0.2);
      const ring = hexToRgba(color, 0.08);

      if (!bgStart || !bgEnd || !hoverStart || !hoverEnd || !activeStart || !activeEnd) return '';

      return `--tab-bg-start:${bgStart};--tab-bg-end:${bgEnd};--tab-hover-start:${hoverStart};--tab-hover-end:${hoverEnd};--tab-active-start:${activeStart};--tab-active-end:${activeEnd};--tab-border:${border};--tab-border-active:${borderActive};--tab-shadow:${shadow};--tab-shadow-hover:${shadowHover};--tab-shadow-active:${shadowActive};--tab-ring:${ring};`;
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function getProjectDisplayName(project) {
      return project.displayName || project.name || 'untitled';
    }

    function cloneProjectState(project) {
      if (!project) return null;
      return {
        path: project.path || null,
        displayName: getProjectDisplayName(project)
      };
    }

    function isEmptyProjectName(name) {
      return /^empty project(?: \(\d+\))?$/.test(name || '');
    }

    function isProjectActive(project) {
      if (!activeProject) return false;
      if (activeProject.path && project.path) {
        return activeProject.path === project.path;
      }
      if (activeProject.path || project.path) return false;

      const name = getProjectDisplayName(project);
      if (name === activeProject.displayName) return true;

      if (!isEmptyProjectName(activeProject.displayName) || !isEmptyProjectName(name)) {
        return false;
      }

      return projects.filter(item => !item.path && isEmptyProjectName(getProjectDisplayName(item))).length === 1;
    }

    function showToast(message, duration = 2500) {
      const toast = document.getElementById('toast');
      if (!toast || !message) return;

      toast.textContent = message;
      toast.classList.add('show');

      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.classList.remove('show');
      }, duration);
    }
    
    // ========================================================================
    // RENDER
    // ========================================================================

    function render() {
      const container = document.getElementById('tabs');
      container.innerHTML = projects.map((p, i) => {
        const colorStyle = getTabColorStyle(p.color);
        const isActive = isProjectActive(p);
        const tabClasses = `tab ${isActive ? 'active' : ''} ${colorStyle ? 'custom-color' : ''}`;
        const displayName = escapeHtml(getProjectDisplayName(p));
        return `
        <div class="${tabClasses.trim()}" data-index="${i}" draggable="true" style="${colorStyle}">
          <span class="name">${displayName}</span>
          ${isActive ? '<span class="active-badge">当前</span>' : ''}
          ${i < 9 ? `<span class="shortcut">⌥${i + 1}</span>` : ''}
          <span class="close" data-action="remove">×</span>
        </div>
      `;
      }).join('');
      
      container.querySelectorAll('.tab').forEach(tab => {
        const index = parseInt(tab.dataset.index);
        tab.addEventListener('click', (e) => {
          if (e.target.dataset.action === 'remove') removeProject(index);
          else openProject(index);
        });
        tab.addEventListener('contextmenu', (e) => {
          e.preventDefault();
          showContextMenu(e, index);
        });
        tab.addEventListener('dragstart', () => { draggedIndex = index; tab.style.opacity = '0.5'; });
        tab.addEventListener('dragend', () => {
          tab.style.opacity = '1'; draggedIndex = null;
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('drag-over'));
        });
        tab.addEventListener('dragover', (e) => {
          e.preventDefault();
          if (draggedIndex !== null && draggedIndex !== index) tab.classList.add('drag-over');
        });
        tab.addEventListener('dragleave', () => tab.classList.remove('drag-over'));
        tab.addEventListener('drop', (e) => {
          e.preventDefault();
          if (draggedIndex !== null && draggedIndex !== index) reorderProjects(draggedIndex, index);
        });
      });
    }
    
    // ========================================================================
    // CONTEXT MENU - 右键菜单
    // ========================================================================
    
    async function showContextMenu(e, index) {
      contextMenuIndex = index;
      const menu = document.getElementById('contextMenu');
      const p = projects[index];
      
      menu.innerHTML = `
        <div class="context-menu-item" data-action="rename">重命名</div>
        <div class="context-menu-divider"></div>
        <div class="color-picker">
          ${COLORS.map(c => `<div class="color-dot ${p.color === c ? 'selected' : ''}" data-color="${c}" style="background:${c}"></div>`).join('')}
          <div class="color-dot ${!p.color ? 'selected' : ''}" data-color="" style="background:#666" title="无颜色"></div>
        </div>
        <div class="context-menu-divider"></div>
        <div class="context-menu-item" data-action="remove">关闭标签</div>
      `;
      
      menu.style.left = e.clientX + 'px';
      menu.style.top = e.clientY + 'px';
      menu.classList.add('show');
      
      await ipcWithTimeout('set-window-height', [200]).catch(e => console.error(e));

      menu.querySelector('[data-action="rename"]').addEventListener('click', () => startRename(index));
      menu.querySelector('[data-action="remove"]').addEventListener('click', () => { hideContextMenu(); removeProject(index); });
      menu.querySelectorAll('.color-dot').forEach(dot => {
        dot.addEventListener('click', () => setColor(index, dot.dataset.color));
      });
    }

    async function hideContextMenu() {
      document.getElementById('contextMenu').classList.remove('show');
      contextMenuIndex = -1;
      await ipcWithTimeout('set-window-height', [36]).catch(e => console.error(e));
    }

    async function setColor(index, color) {
      projects[index].color = color || undefined;
      await ipcWithTimeout('save-projects', [projects]).catch(e => console.error(e));
      render();
      hideContextMenu();
    }
    
    function startRename(index) {
      hideContextMenu();
      const tab = document.querySelector(`.tab[data-index="${index}"]`);
      const nameSpan = tab.querySelector('.name');
      const currentName = projects[index].displayName || projects[index].name;

      nameSpan.textContent = '';
      const input = document.createElement('input');
      input.className = 'rename-input';
      input.value = currentName || '';
      nameSpan.appendChild(input);
      input.focus();
      input.select();
      
      const finishRename = async () => {
        const newName = input.value.trim();
        if (newName && newName !== currentName) {
          projects[index].displayName = newName;
          await ipcWithTimeout('save-projects', [projects]).catch(e => console.error(e));
        }
        render();
      };
      
      input.addEventListener('blur', finishRename);
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') finishRename();
        if (e.key === 'Escape') render();
      });
    }
    
    // ========================================================================
    // DROPDOWN - 从已打开的 Zed 窗口选择
    // ========================================================================
    
    async function toggleDropdown() {
      if (isOperationPending) return;
      const dropdown = document.getElementById('dropdown');
      if (dropdownOpen) {
        dropdown.classList.remove('show');
        dropdownOpen = false;
        await ipcWithTimeout('set-window-height', [36]).catch(e => console.error(e));
        return;
      }

      const addBtn = document.getElementById('addBtn');
      addBtn.classList.add('loading');
      isOperationPending = true;

      try {
        // windows 现在是对象数组: { windowName, path, displayName }
        const windows = await ipcWithTimeout('get-zed-windows', [], 10000);
        const existingPaths = projects.map(p => p.path).filter(Boolean);

        // 过滤已添加的窗口（用 path 匹配）
        const available = windows.filter(w => {
          if (!w.path) return true; // empty project 没有 path，始终显示
          return !existingPaths.includes(w.path);
        });

        let html = '<div class="dropdown-item new-folder" data-action="new-folder">📂 选择文件夹新建...</div>';

        if (available.length > 0) {
          html += '<div class="dropdown-divider"></div>';
          html += '<div class="dropdown-label">已打开的窗口</div>';
          html += available.map((w, i) =>
            `<div class="dropdown-item" data-index="${i}">${escapeHtml(w.displayName)}</div>`
          ).join('');
        }

        dropdown.innerHTML = html;

        dropdown.querySelector('[data-action="new-folder"]').addEventListener('click', selectNewFolder);
        dropdown.querySelectorAll('.dropdown-item[data-index]').forEach(item => {
          const w = available[parseInt(item.dataset.index)];
          item.addEventListener('click', () => addFromDropdown(w));
        });

        dropdown.classList.add('show');
        dropdownOpen = true;
        // 根据实际内容计算高度，不超过屏幕高度
        const itemCount = available.length + 2; // +2 for "选择文件夹" and divider/label
        const contentHeight = itemCount * 40 + 20;
        const maxHeight = window.screen.availHeight - 50; // 留一点边距
        const finalHeight = Math.min(contentHeight, maxHeight);
        // 如果内容超出，给 dropdown 设置 max-height
        if (contentHeight > maxHeight) {
          dropdown.style.maxHeight = (maxHeight - 36) + 'px';
        } else {
          dropdown.style.maxHeight = '';
        }
        await ipcWithTimeout('set-window-height', [36 + finalHeight]).catch(e => console.error(e));
      } catch (e) {
        console.error('[toggleDropdown]', e);
      } finally {
        addBtn.classList.remove('loading');
        isOperationPending = false;
      }
    }

    async function selectNewFolder() {
      if (isOperationPending) return;
      isOperationPending = true;
      const addBtn = document.getElementById('addBtn');
      addBtn.classList.add('loading');

      // 直接关闭下拉菜单，不等待
      document.getElementById('dropdown').classList.remove('show');
      dropdownOpen = false;
      ipcWithTimeout('set-window-height', [36]).catch(e => console.error(e));

      try {
        const folderPath = await ipcWithTimeout('select-folder', [], 30000);
        if (folderPath) {
          const displayName = await ipcWithTimeout('open-folder-in-zed', [folderPath]);
          projects.push({ path: folderPath, displayName });
          await ipcWithTimeout('save-projects', [projects]);
          render();
        }
      } catch (e) {
        console.error('[selectNewFolder]', e);
      } finally {
        addBtn.classList.remove('loading');
        isOperationPending = false;
      }
    }

    async function closeDropdown() {
      document.getElementById('dropdown').classList.remove('show');
      dropdownOpen = false;
      await ipcWithTimeout('set-window-height', [36]).catch(e => console.error(e));
    }

    async function addFromDropdown(w) {
      projects.push({ path: w.path, displayName: w.displayName });
      await ipcWithTimeout('save-projects', [projects]).catch(e => console.error(e));
      render();
      await closeDropdown();
    }
    
    // ========================================================================
    // ACTIONS
    // ========================================================================

    async function openProject(index) {
      if (isOperationPending) return;
      isOperationPending = true;
      const previousActiveProject = activeProject;
      activeProject = cloneProjectState(projects[index]);
      render();

      // 给当前 tab 加 loading 状态
      const tab = document.querySelector(`.tab[data-index="${index}"]`);
      if (tab) tab.classList.add('loading');

      try {
        const p = projects[index];
        const result = await ipcWithTimeout('open-project', [p.path || p.displayName], 10000);
        if (!result || !result.ok) {
          activeProject = confirmedActiveProject || previousActiveProject;
          render();
          const fallbackName = p.displayName || p.path || '该项目';
          showToast(result && result.message ? result.message : `打开失败：${fallbackName}`);
        }
      } catch (e) {
        console.error('[openProject]', e);
        activeProject = confirmedActiveProject || previousActiveProject;
        render();
        showToast('打开项目失败，请重试');
      } finally {
        if (tab) tab.classList.remove('loading');
        isOperationPending = false;
      }
    }
    
    async function removeProject(index) {
      projects.splice(index, 1);
      await ipcWithTimeout('save-projects', [projects]).catch(e => console.error(e));
      render();
    }
    
    async function reorderProjects(from, to) {
      const [item] = projects.splice(from, 1);
      projects.splice(to, 0, item);
      await ipcWithTimeout('save-projects', [projects]).catch(e => console.error(e));
      render();
    }
    
    // ========================================================================
    // INIT
    // ========================================================================
    
    async function init() {
      try {
        projects = await ipcWithTimeout('get-projects', [], 10000);
        confirmedActiveProject = await ipcWithTimeout('get-active-project', [], 3000);
        activeProject = confirmedActiveProject;
      } catch (e) {
        console.error('[init]', e);
        projects = [];
      }
      render();
    }

    ipcRenderer.on('active-project-changed', (_, project) => {
      confirmedActiveProject = project || null;
      activeProject = confirmedActiveProject;
      render();
    });
    
    document.getElementById('addBtn').addEventListener('click', (e) => {
      e.stopPropagation();
      toggleDropdown();
    });
    document.addEventListener('click', async (e) => {
      // 关闭右键菜单
      if (contextMenuIndex !== -1 && !e.target.closest('.context-menu')) {
        hideContextMenu();
      }
      // 关闭下拉菜单 - 点击任何非下拉菜单区域都关闭
      if (dropdownOpen && !e.target.closest('.dropdown')) {
        await closeDropdown();
      }
    });

    // 标签栏鼠标滚轮水平滚动
    document.getElementById('tabs').addEventListener('wheel', (e) => {
      e.preventDefault();
      e.currentTarget.scrollLeft += e.deltaY;
    });

    init();
  </script>
</body>
</html>
